name: Sync GitHub repos to Notion

on:
  schedule:
    - cron: "17 4 * * *"    # daily at 04:17 UTC
  workflow_dispatch: {}     # allow manual run

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync tool repository
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.ORG_SLUG }}/ops-automations
          token: ${{ secrets.GH_BOT_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm install

      - name: Run notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_REPO_DB_ID: ${{ secrets.NOTION_REPO_DB_ID }}
          GITHUB_ORG: ${{ secrets.ORG_SLUG }}
          # Fine-grained Personal Access Token with scope: Metadata: Read only.
          GITHUB_TOKEN: ${{ secrets.ORG_PAT }}
          # Set to "true" to archive Notion pages not found on GitHub
          NOTION_ARCHIVE_MISSING: "true"
        run: npm run notionsync